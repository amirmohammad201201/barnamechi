<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>برنامه چی | نسخه کامل</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #FFD700;
            --text: #f8fafc;
            --danger: #ff4757;
            --success: #2ed573;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Tahoma', sans-serif;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            direction: rtl;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        h2 { text-align: center; color: var(--primary); margin-bottom: 25px; }

        .input-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            outline: none;
        }

        .add-btn {
            background: var(--primary);
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }

        .todo-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #334155;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 10px;
            transition: 0.3s;
        }

        .todo-item.done {
            opacity: 0.5;
            background: #1e293b;
        }

        .todo-item.done span {
            text-decoration: line-through;
        }

        .content {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            flex: 1;
        }

        .del-btn {
            background: var(--danger);
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        }

        .filter-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .filter-btn {
            background: none;
            border: 1px solid #475569;
            color: #94a3b8;
            padding: 5px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
        }

        .filter-btn.active {
            background: var(--primary);
            color: var(--bg);
            border-color: var(--primary);
        }
    </style>
</head>
<body>

<div class="container">
    <h2>برنامه چی؟</h2>
    
    <div class="filter-tabs">
        <button class="filter-btn active" data-filter="all">همه</button>
        <button class="filter-btn" data-filter="active">در جریان</button>
        <button class="filter-btn" data-filter="done">انجام شده</button>
    </div>

    <div class="input-box">
        <input type="text" id="todoInput" placeholder="کار جدید رو بنویس...">
        <button class="add-btn" id="addBtn">افزودن</button>
    </div>

    <div id="listContainer"></div>
</div>

<script>
    const input = document.getElementById('todoInput');
    const addBtn = document.getElementById('addBtn');
    const listContainer = document.getElementById('listContainer');
    const filterBtns = document.querySelectorAll('.filter-btn');

    let tasks = JSON.parse(localStorage.getItem('my_tasks')) || [];
    let currentFilter = 'all';

    // تابع اصلی رندر کردن لیست
    function render() {
        listContainer.innerHTML = '';
        
        const filteredTasks = tasks.filter(t => {if (currentFilter === 'active') return !t.done;
            if (currentFilter === 'done') return t.done;
            return true;
        });

        filteredTasks.forEach((task, index) => {
            const item = document.createElement('div');
            item.className = todo-item ${task.done ? 'done' : ''};
            item.innerHTML = `
                <div class="content" onclick="toggleTask(${task.id})">
                    <input type="checkbox" ${task.done ? 'checked' : ''}>
                    <span>${task.text}</span>
                </div>
                <button class="del-btn" onclick="deleteTask(${task.id})">حذف</button>
            `;
            listContainer.appendChild(item);
        });

        localStorage.setItem('my_tasks', JSON.stringify(tasks));
    }

    // اضافه کردن کار جدید
    function addTask() {
        if (input.value.trim() === '') return;
        tasks.push({
            id: Date.now(),
            text: input.value,
            done: false
        });
        input.value = '';
        render();
    }

    // تغییر وضعیت انجام شد/نشد
    window.toggleTask = function(id) {
        tasks = tasks.map(t => t.id === id ? {...t, done: !t.done} : t);
        render();
    };

    // حذف کار
    window.deleteTask = function(id) {
        tasks = tasks.filter(t => t.id !== id);
        render();
    };

    // ایونت لسنرها
    addBtn.addEventListener('click', addTask);
    input.addEventListener('keypress', (e) => { if(e.key === 'Enter') addTask(); });

    filterBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            filterBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.getAttribute('data-filter');
            render();
        });
    });

    // اجرای اولیه
    render();
</script>

</body>
</html>
