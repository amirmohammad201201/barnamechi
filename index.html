<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>برنامه چی | نسخه نهایی</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; direction: rtl; }
        .container { width: 350px; background: #1e1e1e; padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { text-align: center; color: #FFD700; }
        .input-group { display: flex; gap: 5px; margin-bottom: 20px; }
        input { flex: 1; padding: 10px; border-radius: 5px; border: 1px solid #333; background: #252525; color: white; }
        button#addBtn { background: #FFD700; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .item { display: flex; justify-content: space-between; background: #2c2c2c; padding: 10px; border-radius: 8px; margin-bottom: 8px; align-items: center; }
        .item.done span { text-decoration: line-through; color: #888; }
        .del-btn { background: #ff4757; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        .text-part { cursor: pointer; flex: 1; }
    </style>
</head>
<body>

<div class="container">
    <h2>برنامه چی؟</h2>
    <div class="input-group">
        <input type="text" id="taskInput" placeholder="بنویس...">
        <button id="addBtn">افزودن</button>
    </div>
    <div id="list"></div>
</div>

<script>
    const input = document.getElementById('taskInput');
    const addBtn = document.getElementById('addBtn');
    const list = document.getElementById('list');

    // لود کردن از حافظه
    let tasks = JSON.parse(localStorage.getItem('tasks_v2')) || [];

    function render() {
        list.innerHTML = tasks.map(t => `
            <div class="item ${t.done ? 'done' : ''}" data-id="${t.id}">
                <div class="text-part">
                    <input type="checkbox" ${t.done ? 'checked' : ''}>
                    <span>${t.text}</span>
                </div>
                <button class="del-btn">حذف</button>
            </div>
        `).join('');
        localStorage.setItem('tasks_v2', JSON.stringify(tasks));
    }

    // مدیریت کلیک‌ها روی کل لیست (روش ضد خطا)
    list.addEventListener('click', (e) => {
        const id = Number(e.target.closest('.item').dataset.id);
        
        if (e.target.classList.contains('del-btn')) {
            tasks = tasks.filter(t => t.id !== id);
        } else {
            tasks = tasks.map(t => t.id === id ? {...t, done: !t.done} : t);
        }
        render();
    });

    // دکمه افزودن
    addBtn.onclick = () => {
        if (input.value.trim() === "") return;
        tasks.push({ id: Date.now(), text: input.value, done: false });
        input.value = "";
        render();
    };

    // اینتر زدن
    input.onkeypress = (e) => { if(e.key === 'Enter') addBtn.onclick(); };

    render();
</script>

</body>
</html>
