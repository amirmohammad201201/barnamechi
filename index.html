<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>برنامه چی | نسخه تضمینی</title>
    <style>
        body { 
            background-color: #121212; 
            color: #ffffff; 
            font-family: Arial, sans-serif; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            padding-top: 50px;
        }
        .main-card {
            background: #1c1c1c;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            width: 320px;
            border: 2px solid #0f3460;
        }
        h2 { color: #e94560; text-align: center; margin-bottom: 20px; }
        .input-area { display: flex; gap: 5px; margin-bottom: 20px; }
        input { 
            flex: 1; 
            padding: 10px; 
            border-radius: 5px; 
            border: none; 
            outline: none;
        }
        .add-btn { 
            background: #e94560; 
            color: white; 
            border: none; 
            padding: 10px 15px; 
            border-radius: 5px; 
            cursor: pointer; 
            font-weight: bold;
        }
        .list-item {
            background: #0f3460;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .task-text { cursor: pointer; flex: 1; }
        .done { text-decoration: line-through; color: #53354a; }
        .del-btn { 
            background: #53354a; 
            color: #e94560; 
            border: 1px solid #e94560; 
            padding: 3px 8px; 
            border-radius: 4px; 
            cursor: pointer;
            font-size: 11px;
        }
    </style>
</head>
<body>

    <div class="main-card">
        <h2>برنامه چی؟</h2>
        
        <div class="input-area">
            <input type="text" id="myInput" placeholder="کارت رو بنویس...">
            <button class="add-btn" id="submitButton">افزودن</button>
        </div>

        <div id="taskContainer"></div>
    </div>

    <script>
        // ۱. متغیرها
        var inputField = document.getElementById("myInput");
        var addButton = document.getElementById("submitButton");
        var container = document.getElementById("taskContainer");
        
        // ۲. آرایه اطلاعات (تلاش برای خواندن از حافظه)
        var allTasks = [];
        var saved = localStorage.getItem("barnamechi_data");
        if (saved) {
            allTasks = JSON.parse(saved);
        }

        // ۳. تابع نمایش لیست
        function refreshList() {
            container.innerHTML = ""; // خالی کردن لیست برای بازنویسی
            
            for (var i = 0; i < allTasks.length; i++) {
                var task = allTasks[i];
                
                // ساختن بدنه هر آیتم
                var div = document.createElement("div");
                div.className = "list-item";
                if (task.isDone) { div.className += " done"; }

                var span = document.createElement("span");
                span.className = "task-text";
                span.innerHTML = task.title;
                // قابلیت تیک زدن (با استفاده از یک ترفند ساده برای انتقال ID)
                span.setAttribute("onclick", "toggleStatus(" + i + ")");

                var btn = document.createElement("button");
                btn.className = "del-btn";
                btn.innerHTML = "حذف";
                btn.setAttribute("onclick", "removeTask(" + i + ")");

                div.appendChild(span);
                div.appendChild(btn);
                container.appendChild(div);
            }
            
            // ذخیره در حافظه
            localStorage.setItem("barnamechi_data", JSON.stringify(allTasks));
        }

        // ۴. تابع افزودن
        addButton.onclick = function() {
            var val = inputField.value;
            if (val.trim() === "") {
                alert("لطفاً چیزی بنویسید!");
                return;
            }
            allTasks.push({ title: val, isDone: false });
            inputField.value = "";
            refreshList();
        };

        // ۵. تابع حذف
        function removeTask(index) {
            allTasks.splice(index, 1);
            refreshList();
        }

        // ۶. تابع تیک زدن
        function toggleStatus(index) {
            allTasks[index].isDone = !allTasks[index].isDone;
            refreshList();
        }

        // ۷. اجرای اولیه برای نمایش داده‌های قبلی
        refreshList();
    </script>
</body>
</html>
