<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>برنامه‌چی حرفه‌ای</title>

<style>
:root{
  --bg:#f5f7fb;
  --card:#fff;
  --text:#222;
  --main:#6366f1;
}
.dark{
  --bg:#0f172a;
  --card:#1e293b;
  --text:#e5e7eb;
  --main:#22c55e;
}

body{
  margin:0;
  font-family:sans-serif;
  background:var(--bg);
  color:var(--text);
}

header{
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:var(--card);
}

button{
  border:none;
  padding:6px 10px;
  border-radius:8px;
  background:var(--main);
  color:#fff;
  cursor:pointer;
}

.container{max-width:600px;margin:20px auto;}

input,select{
  padding:10px;
  margin:5px;
  width:100%;
}

.task{
  background:var(--card);
  padding:10px;
  margin:10px 0;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
}

.done{ text-decoration:line-through; opacity:.6; }

.star{ color:gold; }

.progress{
  height:10px;
  background:#ddd;
  border-radius:10px;
}
.bar{
  height:100%;
  background:var(--main);
  width:0%;
}
</style>
</head>

<body>

<header>
  <h2>🚀 برنامه‌چی</h2>
  <button id="darkBtn">🌙</button>
</header>

<div class="container">

<input id="title" placeholder="کار جدید...">
<select id="category">
  <option>درس</option>
  <option>کار</option>
  <option>شخصی</option>
</select>
<button id="addBtn">اضافه</button>

<div class="progress"><div class="bar" id="bar"></div></div>

<ul id="list"></ul>

</div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

const list = document.getElementById("list");
const title = document.getElementById("title");
const category = document.getElementById("category");
const bar = document.getElementById("bar");

document.getElementById("addBtn").onclick = add;
document.getElementById("darkBtn").onclick = () => {
  document.body.classList.toggle("dark");
};

function save(){
  localStorage.setItem("tasks", JSON.stringify(tasks));
}

function add(){
  if(!title.value) return;

  tasks.push({
    title:title.value,
    cat:category.value,
    done:false,
    star:false
  });

  title.value="";
  save();
  render();
}

function render(){
  list.innerHTML = "";

  tasks.forEach((t,i)=>{
    const li = document.createElement("li");
    li.className = "task";

    const text = document.createElement("span");
    text.textContent = (t.star ? "⭐ " : "") + t.title + " (" + t.cat + ")";
    if(t.done) text.classList.add("done");

    const btns = document.createElement("div");

    const doneBtn = document.createElement("button");
    doneBtn.textContent = "✔";
    doneBtn.onclick = ()=>{ tasks[i].done=!tasks[i].done; save(); render(); };

    const editBtn = document.createElement("button");
    editBtn.textContent = "✏️";
    editBtn.onclick = ()=>{
      let val = prompt("ویرایش:", t.title);
      if(val){ tasks[i].title = val; save(); render(); }
    };

    const starBtn = document.createElement("button");
    starBtn.textContent = "⭐";
    starBtn.onclick = ()=>{ tasks[i].star=!tasks[i].star; save(); render(); };

    const delBtn = document.createElement("button");
    delBtn.textContent = "❌";
    delBtn.onclick = ()=>{ tasks.splice(i,1); save(); render(); };

    btns.append(doneBtn, editBtn, starBtn, delBtn);

    li.append(text, btns);
    list.append(li);
  });

  let doneCount = tasks.filter(t=>t.done).length;
  let percent = tasks.length ? (doneCount / tasks.length) * 100 : 0;
  bar.style.width = percent + "%";
}

render();
</script>

</body>
</html>
